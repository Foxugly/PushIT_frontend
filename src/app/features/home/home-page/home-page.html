<main class="public-content home-content">
  <section class="hero-grid">
    <section class="public-card hero-card">
      <span class="public-badge public-badge--soft">{{ copy().badge }}</span>
      <h1>{{ copy().title }}</h1>
      <p>{{ copy().description }}</p>

      <div class="hero-actions">
        <a class="public-button" routerLink="/features">{{ copy().primary }}</a>
        <a class="public-button public-button--secondary" routerLink="/auth">{{ copy().secondary }}</a>
      </div>
    </section>

    <app-register-panel
      [title]="copy().register.title"
      [subtitle]="copy().register.subtitle"
      [showLoginLink]="false"
    />
  </section>
</main>
