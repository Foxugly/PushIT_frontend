<p-table [value]="[items()]" [styleClass]="styleClass()">
  <ng-template pTemplate="header">
    <tr>
      @for (item of items(); track item.label) {
        <th>{{ item.label }}</th>
      }
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-row>
    <tr>
      @for (item of row; track item.label) {
        <td>
          @if (item.severity) {
            <p-tag [value]="item.value" [severity]="item.severity" />
          } @else {
            {{ item.value }}
          }
        </td>
      }
    </tr>
  </ng-template>
</p-table>
