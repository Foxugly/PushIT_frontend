<section class="console-card console-shell__sticky">
  <div class="console-shell__sidebar-header">
    <div>
      <p class="console-shell__eyebrow">{{ copy().eyebrow }}</p>
      <h2>{{ copy().title }}</h2>
    </div>
  </div>

  <nav class="console-shell__nav" aria-label="Console navigation">
    @for (item of navigationItems(); track item.link) {
      <app-console-menu-item
        [link]="item.link"
        [label]="item.label"
        [description]="item.description"
        [icon]="item.icon"
        [count]="item.count"
      />
    }
  </nav>

  @if (shell.lastGeneratedToken(); as tokenState) {
    <div class="console-shell__token">
      <div class="console-card__header">
        <div>
          <p class="console-shell__eyebrow">{{ copy().tokenEyebrow }}</p>
          <h3>App #{{ tokenState.appId }}</h3>
        </div>
        <p-button [label]="copy().copyButton" severity="secondary" (onClick)="copyLatestToken()" />
      </div>
      <p class="console-note">{{ copy().tokenNote }}</p>
      <textarea rows="4" readonly>{{ tokenState.token }}</textarea>
    </div>
  }
</section>
