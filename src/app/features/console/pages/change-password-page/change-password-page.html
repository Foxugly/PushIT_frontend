<section class="console-page">
  <header class="console-page__hero">
    <div>
      <p class="console-shell__eyebrow">{{ copy().eyebrow }}</p>
      <h2>{{ copy().title }}</h2>
      <p class="console-muted">{{ copy().description }}</p>
    </div>
  </header>

  <section class="console-card">
    <div class="console-card__header">
      <div>
        <p class="console-shell__eyebrow">{{ copy().backendEyebrow }}</p>
        <h3>{{ copy().backendTitle }}</h3>
      </div>
    </div>

    <p class="console-note">{{ copy().note }}</p>
  </section>
</section>
