<section class="console-shell">
  <div class="console-shell__backdrop">
    <app-site-header
      [sticky]="true"
      [showLoginButton]="false"
      [showUserMenu]="true"
      [username]="shell.user()?.username || 'Console'"
      [settingsSummary]="settings.apiBaseUrl()"
      (logoutRequested)="shell.logout()"
    />

    <div class="console-shell__body">
      <aside class="console-shell__sidebar">
        <app-console-navigation />
      </aside>

      <main class="console-shell__main">
        @if (shell.error()) {
          <section class="console-card console-error">
            <p>{{ shell.error() }}</p>
          </section>
        } @else if (shell.loading() && !shell.apps().length) {
          <section class="console-card">
            <p class="console-empty">Chargement de votre console...</p>
          </section>
        } @else {
          <router-outlet />
        }
      </main>
    </div>

    <app-site-footer />
  </div>
</section>
