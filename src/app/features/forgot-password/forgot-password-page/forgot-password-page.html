<form class="public-card public-card--compact public-form forgot-card" [formGroup]="form" (ngSubmit)="submit()">
  <span class="public-eyebrow">{{ copy().eyebrow }}</span>
  <h1>{{ copy().title }}</h1>
  <p>{{ copy().description }}</p>

  <label>
    <span>{{ copy().email }}</span>
    <input pInputText type="email" formControlName="email" placeholder="ops@pushit.local" class="public-input" />
  </label>

  <div class="public-submit-row forgot-submit-row">
    <p-button type="submit" [label]="copy().submit" />
  </div>

  @if (submitted()) {
    <app-alert [message]="copy().submitted" tone="success" (dismissed)="submitted.set(false)" />
  }

  <p class="secondary-link">
    {{ copy().registerPrompt }}
    <a routerLink="/register">{{ copy().registerLink }}</a>
  </p>
</form>
