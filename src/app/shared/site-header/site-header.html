<header class="site-header" [class.site-header--sticky]="sticky()" [style.--site-header-max-width]="maxWidth()">
  <nav class="site-nav">
    <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">
      {{ labels().home }}
    </a>
    @if (session.isAuthenticated()) {
      <a routerLink="/dashboard" routerLinkActive="is-active">{{ labels().dashboard }}</a>
    }
    <a routerLink="/features" routerLinkActive="is-active">{{ labels().features }}</a>
    <a routerLink="/donate" routerLinkActive="is-active">{{ labels().donate }}</a>
    <a routerLink="/about" routerLinkActive="is-active">{{ labels().about }}</a>
  </nav>

  <div class="header-actions">
    <p-selectbutton
      [options]="languages"
      optionLabel="label"
      optionValue="code"
      [ngModel]="activeLanguage()"
      (ngModelChange)="setLanguage($event)"
      ariaLabel="Language switcher"
    />

    @if (session.isAuthenticated()) {
      <p-menu #userMenu [model]="userMenuItems()" [popup]="true" appendTo="body" />
      <p-button
        [label]="displayUsername()"
        icon="pi pi-angle-down"
        iconPos="right"
        severity="contrast"
        rounded="true"
        (onClick)="userMenu.toggle($event)"
      />
    } @else {
      <a routerLink="/auth" pButton [label]="labels().login" rounded="true" class="login-link"></a>
    }
  </div>
</header>
